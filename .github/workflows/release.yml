# release.yml — publish to npm on a `v*` tag push.
# Reuses ci.yml's test matrix as a gate, adds a `smoke` job that installs/runs the actual
# `npm pack` TARBALL (not the source tree) — the class of packaging bug (missing `files` entry,
# broken `bin` symlink, a repo-relative path) that shipped in 0.1.0 past a fully green
# `node --test` run — then verifies the tag matches package.json's `version` before publishing
# (a mismatched tag is almost always a forgotten version bump, not something to publish silently
# under the wrong number).
# Zero npm deps (see ci.yml) — no `npm ci` step needed, nothing to install before testing.
name: release

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    name: test (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: Run unit tests
        run: node --test tools/*.test.mjs

  smoke:
    name: smoke (tarball, node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: Pack + install + run the published tarball
        run: bash scripts/smoke-tarball.sh

  publish:
    name: npm publish
    needs: [test, smoke]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required by `npm publish --provenance`
    steps:
      - uses: actions/checkout@v4
      # OIDC trusted publishing (v0.7.0+): NO NPM_TOKEN. npm detects the GitHub Actions OIDC
      # environment (id-token: write above) and exchanges it for a short-lived publish
      # credential against the npmjs.com Trusted Publisher configured for
      # alexgrebeshok-coder/samemind + workflow release.yml. NODE_AUTH_TOKEN is deliberately
      # NOT set on the publish step — setting it makes npm take the legacy token path instead
      # of OIDC. `registry-url` stays so npm targets the public registry; `--provenance` rides
      # the same OIDC identity. Requires npm >= 11.5.1, hence the upgrade below (node 22 ships 10.x).
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
      - name: Upgrade npm for OIDC trusted publishing (needs >= 11.5.1)
        run: npm install -g npm@latest

      - name: Verify tag matches package.json version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::tag v$TAG_VERSION does not match package.json version $PKG_VERSION"
            exit 1
          fi
          echo "tag v$TAG_VERSION matches package.json version $PKG_VERSION"

      # OIDC trusted publishing: no env token — npm uses the GitHub OIDC identity.
      - name: Publish to npm (OIDC trusted publishing — no token)
        run: npm publish --provenance --access public
