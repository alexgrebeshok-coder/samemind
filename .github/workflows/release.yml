# release.yml — publish to npm on a `v*` tag push.
# Reuses ci.yml's test matrix as a gate, adds a `smoke` job that installs/runs the actual
# `npm pack` TARBALL (not the source tree) — the class of packaging bug (missing `files` entry,
# broken `bin` symlink, a repo-relative path) that shipped in 0.1.0 past a fully green
# `node --test` run — then verifies the tag matches package.json's `version` before publishing
# (a mismatched tag is almost always a forgotten version bump, not something to publish silently
# under the wrong number).
# Zero npm deps (see ci.yml) — no `npm ci` step needed, nothing to install before testing.
name: release

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    name: test (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: Run unit tests
        run: node --test tools/*.test.mjs

  smoke:
    name: smoke (tarball, node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: Pack + install + run the published tarball
        run: bash scripts/smoke-tarball.sh

  publish:
    name: npm publish
    needs: [test, smoke]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required by `npm publish --provenance`
    steps:
      - uses: actions/checkout@v4
      # token auth + provenance attestation via OIDC id-token: OIDC *trusted publishing*
      # (npm exchanging id-token for a short-lived publish credential with no NPM_TOKEN at all)
      # never authenticated here — ENEEDAUTH, the npmjs.com trusted-publisher config didn't
      # match this owner/repo/workflow. Reverting to the token-auth path that published
      # 0.6.0-0.6.1: `registry-url` makes setup-node write
      # `//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}` into .npmrc, and NODE_AUTH_TOKEN
      # (below) is what fills that placeholder. `id-token: write` stays and `--provenance` still
      # gets attested — provenance signing rides its own OIDC exchange with Sigstore
      # independent of *publish* auth, so token-based auth + provenance is the standard,
      # documented npm combination (not mutually exclusive with trusted publishing, just the
      # older/simpler half of it).
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Verify tag matches package.json version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::tag v$TAG_VERSION does not match package.json version $PKG_VERSION"
            exit 1
          fi
          echo "tag v$TAG_VERSION matches package.json version $PKG_VERSION"

      # NPM_TOKEN (repo secret): the actual publish auth. `--provenance` still needs
      # `id-token: write` above — that's a separate OIDC exchange for the Sigstore
      # attestation, unrelated to the registry auth token.
      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public
